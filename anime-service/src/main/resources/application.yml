spring:
  #profiles: | Definindo os profiles ativos
  #active: mysql, mongo
    application:
      name: anime-service
    datasource:
      url: jdbc:mysql://localhost:3306/anime_service?useTimezone=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      username: ${ENV_ROOT_USER:root}
      password: ${ENV_ROOT_PASSWORD:devdojo}
    jpa:
      show-sql: true
      hibernate:
        ddl-auto: none
    # criação de threads virtuais
    threads:
      virtual:
        enabled: true
    flyway: # Ativa automaticamente com o uso da dependência no pom.xml
      enabled: true
logging:
  level:
    academy.devdojo: debug
server:
  servlet:
    context-path: /
    #context-path: /${spring.application.name} | Usando o nome do projeto na URL por padrão
  error:
    # Quando mostrar o stacketrace em caso de erro?
    # always (padrão) - on_param - never (mais recomendado em projetos públicos)
    include-stacktrace: on_param
  tomcat:
    threads:
      # máximo de threads de plataformas que o tomcat pode utilizar
      max: 20
management:
  server:
    port: 8989
  endpoints:
    web:
      exposure:
        include: "*"